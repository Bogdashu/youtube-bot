version: "3.8"

services:

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest

    command:
      - --local

    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}

    ports:
      - "8081:8081"

    restart: unless-stopped

  bot:
    build: .

    depends_on:
      - telegram-bot-api

    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOCAL_BOT_API_URL: http://telegram-bot-api:8081

    restart: unless-stopped
