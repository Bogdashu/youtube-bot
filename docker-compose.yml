version: '3.8'

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_BOT_TOKEN: ${BOT_TOKEN}
    ports:
      - "8081:8081"
    volumes:
      - tg-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOCAL_BOT_API_URL: http://telegram-bot-api:8081
    depends_on:
      - telegram-bot-api
    restart: unless-stopped

volumes:
  tg-bot-api-data:
